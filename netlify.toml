[build]
  base = "frontend"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/v1/dashboard/summary"
  to = "/.netlify/functions/dashboard"
  status = 200

[[redirects]]
  from = "/api/v1/income"
  to = "/.netlify/functions/income"
  status = 200

[[redirects]]
  from = "/api/v1/expenses"
  to = "/.netlify/functions/expenses"
  status = 200

[[redirects]]
  from = "/api/v1/loans"
  to = "/.netlify/functions/loans"
  status = 200

[[redirects]]
  from = "/api/v1/investments"
  to = "/.netlify/functions/investments"
  status = 200

[[redirects]]
  from = "/api/v1/savings"
  to = "/.netlify/functions/savings"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200