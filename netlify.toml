[build]
  base = "frontend"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"
  VITE_SUPABASE_URL = "https://zcoldagsacuaceohddal.supabase.co"
  VITE_SUPABASE_ANON_KEY = "sb_publishable_5yBakyZylUUcYza32az7Ug_kDMZa-Y6"

[functions]
  directory = "netlify/functions"

[[redirects]]
